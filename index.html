<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Professor Scheuerman's Job Hub</title>
<style>
  :root { --bg:#0f172a; --card:#1e293b; --line:#334155; --text:#e2e8f0;
           --muted:#94a3b8; --accent:#38bdf8; --new:#22c55e; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,Segoe UI,Roboto,sans-serif;
          background:var(--bg); color:var(--text); }
  header { padding:28px 20px 14px; text-align:center; }
  h1 { margin:0 0 6px; font-size:1.6rem; }
  .sub { color:var(--muted); font-size:.9rem; }
  .wrap { max-width:900px; margin:0 auto; padding:0 16px 60px; }
  .controls { position:sticky; top:0; background:var(--bg); padding:14px 0;
               border-bottom:1px solid var(--line); z-index:5; }
  #search { width:100%; padding:11px 14px; font-size:1rem; border-radius:10px;
             border:1px solid var(--line); background:var(--card); color:var(--text); }
  .chips { display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
  .chip { padding:7px 13px; border-radius:999px; border:1px solid var(--line);
           background:var(--card); color:var(--text); cursor:pointer; font-size:.85rem; }
  .chip.active { background:var(--accent); color:#08131f; border-color:var(--accent);
                  font-weight:600; }
  .count { color:var(--muted); font-size:.85rem; margin:14px 2px 6px; }
  .job { background:var(--card); border:1px solid var(--line); border-radius:12px;
          padding:15px 17px; margin-bottom:11px; }
  .job h3 { margin:0 0 5px; font-size:1.06rem; }
  .job h3 a { color:var(--accent); text-decoration:none; }
  .job h3 a:hover { text-decoration:underline; }
  .meta { color:var(--muted); font-size:.88rem; }
  .tag { display:inline-block; font-size:.72rem; padding:2px 8px; border-radius:6px;
          background:#0b2a3a; color:var(--accent); margin-right:6px; }
  .badge-new { background:var(--new); color:#052e16; font-weight:700; }
  .badge-emp { background:#3b2f0b; color:#fbbf24; font-weight:600; }
  .badge-intern { background:#2e1065; color:#c4b5fd; font-weight:600; }
  .empty { text-align:center; color:var(--muted); padding:40px; }
  footer { text-align:center; color:var(--muted); font-size:.8rem; padding:20px; }
</style>
</head>
<body>
<header>
  <h1>Professor Scheuerman's Job Hub</h1>
  <div class="sub">Las Vegas / Henderson networking &amp; cybersecurity roles for students &middot;
    13 openings &middot; 5 new today &middot; updated July 01, 2026 at 08:01 AM</div>
</header>
<div class="wrap">
  <div class="controls">
    <input id="search" type="search" placeholder="Search title, company, or location...">
    <div class="chips">
      <button class="chip active" data-type="All">All</button>
      <button class="chip" data-type="__NEW__">New today</button>
      <button class="chip" data-type="__INTERN__">Internships</button>
      <button class="chip" data-type="__EMPLOYER__">&#9733; Local employers</button>
      <button class="chip" data-type="Cybersecurity">Cybersecurity</button><button class="chip" data-type="IT (General)">IT (General)</button><button class="chip" data-type="Systems / SysAdmin">Systems / SysAdmin</button>
    </div>
  </div>
  <div class="count" id="count"></div>
  <div id="list"></div>
</div>
<footer>Read-only listing &middot; auto-updated daily &middot; source: Adzuna &amp; The Muse</footer>

<script>
  const JOBS = [{"title": "Computer Scientist II", "company": "JT4 LLC", "location": "Sunrise Manor, Clark County", "source": "Adzuna", "posted": "2026-07-01", "employer": "", "internship": "", "url": "https://www.adzuna.com/land/ad/5783520780?se=vsHRkl118RGmu92EkDkeFQ&utm_medium=api&utm_source=91285cc9&v=31FF1EA092568308F378293E9D6F0D881B73D7A2", "first_seen": "2026-07-01", "type": "IT (General)"}, {"title": "IT Help Desk Associate", "company": "Brightline West", "location": "Las Vegas, Clark County", "source": "Adzuna", "posted": "2026-07-01", "employer": "", "internship": "", "url": "https://www.adzuna.com/details/5783306876?utm_medium=api&utm_source=91285cc9", "first_seen": "2026-07-01", "type": "Cybersecurity"}, {"title": "Security Operations Center Officer", "company": "Palms", "location": "Las Vegas, Clark County", "source": "Adzuna", "posted": "2026-07-01", "employer": "", "internship": "", "url": "https://www.adzuna.com/details/5783212386?utm_medium=api&utm_source=91285cc9", "first_seen": "2026-07-01", "type": "Cybersecurity"}, {"title": "Information Systems Engineer", "company": "Siemens Healthineers", "location": "Las Vegas, Clark County", "source": "Adzuna", "posted": "2026-06-30", "employer": "", "internship": "", "url": "https://www.adzuna.com/details/5782816262?utm_medium=api&utm_source=91285cc9", "first_seen": "2026-07-01", "type": "Systems / SysAdmin"}, {"title": "CMMC Compliance Analyst", "company": "Lumen", "location": "Las Vegas, Clark County", "source": "Adzuna", "posted": "2026-06-30", "employer": "", "internship": "", "url": "https://www.adzuna.com/land/ad/5781938716?se=vsHRkl118RGmu92EkDkeFQ&utm_medium=api&utm_source=91285cc9&v=8C0F55DE9E1967CFC38765D01C78E6F3C2A33A71", "first_seen": "2026-06-30", "type": "Cybersecurity"}, {"title": "ISSO with Security Clearance", "company": "Zachary Piper Solutions, LLC", "location": "Sunrise Manor, Clark County", "source": "Adzuna", "posted": "2026-06-28", "employer": "", "internship": "", "url": "https://www.adzuna.com/land/ad/5780413573?se=vsHRkl118RGmu92EkDkeFQ&utm_medium=api&utm_source=91285cc9&v=B80B011049B3B9D56D6CB8DCEFA617264FA6F8C9", "first_seen": "2026-06-30", "type": "Cybersecurity"}, {"title": "Junior Security Engineer", "company": "Maximus", "location": "Las Vegas, Clark County", "source": "Adzuna", "posted": "2026-06-28", "employer": "", "internship": "", "url": "https://www.adzuna.com/land/ad/5780272482?se=vsHRkl118RGmu92EkDkeFQ&utm_medium=api&utm_source=91285cc9&v=2628590701BD27B36C1AFAF4038C471FE8474513", "first_seen": "2026-06-30", "type": "Cybersecurity"}, {"title": "Security Analyst - Identity and Access Management", "company": "EMCOR Group", "location": "Paradise, Clark County", "source": "Adzuna", "posted": "2026-06-26", "employer": "", "internship": "", "url": "https://www.adzuna.com/land/ad/5778554505?se=kGFvl1118RGmu92EkDkeFQ&utm_medium=api&utm_source=91285cc9&v=8863351A6E855E92EF0BE07ED2C271DFE60FE44E", "first_seen": "2026-06-30", "type": "Cybersecurity"}, {"title": "Human Resources Systems Administrator", "company": "City of Henderson", "location": "Henderson, Clark County", "source": "Employer", "posted": "2026-06-24", "employer": "City of Henderson", "internship": "", "url": "https://www.adzuna.com/details/5775708791?utm_medium=api&utm_source=91285cc9", "first_seen": "2026-06-30", "type": "Systems / SysAdmin"}, {"title": "Maritime Domain Modeling & Simulation Analyst with Security Clearance", "company": "Tharros Defense, Inc.", "location": "Nellis Air Force Base, Clark County", "source": "Adzuna", "posted": "2026-06-23", "employer": "", "internship": "", "url": "https://www.adzuna.com/land/ad/5773220939?se=vsHRkl118RGmu92EkDkeFQ&utm_medium=api&utm_source=91285cc9&v=5CB38913EF823B198E88196A6E4451419E6925B5", "first_seen": "2026-06-30", "type": "Cybersecurity"}, {"title": "Cyber Analyst, SME with Security Clearance", "company": "Peraton", "location": "Nellis Air Force Base, Clark County", "source": "Adzuna", "posted": "2026-06-23", "employer": "", "internship": "", "url": "https://www.adzuna.com/land/ad/5773215169?se=vsHRkl118RGmu92EkDkeFQ&utm_medium=api&utm_source=91285cc9&v=0F19D460FC6B3B5217D1C79CD313B9FD8FE94B53", "first_seen": "2026-07-01", "type": "Cybersecurity"}, {"title": "IT Technician", "company": "Star Nursery", "location": "Green Valley, Clark County", "source": "Adzuna", "posted": "2026-06-19", "employer": "", "internship": "", "url": "https://www.adzuna.com/details/5769233071?utm_medium=api&utm_source=91285cc9", "first_seen": "2026-06-30", "type": "IT (General)"}, {"title": "2026-2027 - Cybersecurity - Advance Tech Academy", "company": "Clark County School District", "location": "North Las Vegas, Clark County", "source": "Adzuna", "posted": "2026-06-19", "employer": "Clark County", "internship": "", "url": "https://www.adzuna.com/details/5769104836?utm_medium=api&utm_source=91285cc9", "first_seen": "2026-06-30", "type": "Cybersecurity"}];
  const TODAY = "2026-07-01";
  let activeType = "All";

  const list = document.getElementById("list");
  const countEl = document.getElementById("count");
  const search = document.getElementById("search");

  function esc(s) {
    return (s || "").replace(/[&<>"]/g, c =>
      ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;" }[c]));
  }

  function render() {
    const q = search.value.trim().toLowerCase();
    const shown = JOBS.filter(j => {
      if (activeType === "__NEW__") { if (j.first_seen !== TODAY) return false; }
      else if (activeType === "__INTERN__") { if (j.internship !== "yes") return false; }
      else if (activeType === "__EMPLOYER__") { if (!j.employer) return false; }
      else if (activeType !== "All") { if (j.type !== activeType) return false; }
      if (q) {
        const hay = (j.title + " " + j.company + " " + j.location).toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });

    countEl.textContent = shown.length + " job" + (shown.length === 1 ? "" : "s") + " shown";
    if (!shown.length) { list.innerHTML = '<div class="empty">No jobs match your filters.</div>'; return; }

    list.innerHTML = shown.map(j => {
      const isNew = j.first_seen === TODAY;
      const posted = j.posted ? " &middot; posted " + esc(j.posted) : "";
      return `<div class="job">
        <h3><a href="${esc(j.url)}" target="_blank" rel="noopener">${esc(j.title)}</a></h3>
        <div class="meta">
          <span class="tag">${esc(j.type)}</span>
          ${isNew ? '<span class="tag badge-new">NEW</span>' : ''}
          ${j.employer ? '<span class="tag badge-emp">&#9733; ' + esc(j.employer) + '</span>' : ''}
          ${j.internship === "yes" ? '<span class="tag badge-intern">Internship</span>' : ''}
          ${esc(j.company)} &middot; ${esc(j.location)}${posted}
        </div>
      </div>`;
    }).join("");
  }

  document.querySelectorAll(".chip").forEach(chip => {
    chip.addEventListener("click", () => {
      document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
      chip.classList.add("active");
      activeType = chip.dataset.type;
      render();
    });
  });
  search.addEventListener("input", render);
  render();
</script>
</body>
</html>
